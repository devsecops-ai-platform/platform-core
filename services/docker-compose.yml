version: '3.9'

services:

  auth-service:
    build: ./services/auth-service

    container_name: auth-service

    ports:
      - "5000:5000"

    environment:
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: securepassword
      JWT_SECRET_KEY: supersecretjwtkey

    depends_on:
      - postgres-auth

    networks:
      - platform-network

  postgres-auth:
    image: postgres:15

    container_name: postgres-auth

    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: securepassword

    ports:
      - "5432:5432"

    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

    networks:
      - platform-network

volumes:
  postgres_auth_data:

networks:
  platform-network: